# This file is a catalog of dependencies and plugins used in the project.
# It helps to manage versions and dependencies in a centralized way.
# For more information, see https://docs.gradle.org/current/userguide/platforms.html#sub:version-catalog

[versions]
# Android Gradle Plugin
agp = "8.13.1"
# Desugaring for newer Java NIO APIs on older Android versions
desugar_jdk_libs_nio = "2.1.5"
# Fast Serialization library
fst = "3.0.3"
# Kotlin programming language
kotlin = "2.2.0"
# AndroidX Core KTX (Kotlin Extensions)
coreKtx = "1.17.0"
# AndroidX AppCompat for backward compatibility of UI components
appcompat = "1.7.1"
# AndroidX Biometric for authentication
biometric = "1.1.0"
# NewPipeExtractor for extracting video stream data
new_pipe_extractor = "v0.24.8"
# ObjectBox database for Android
objectbox_android = "5.0.1"
# AndroidX WebKit for integrating web content
webkit = "1.14.0"
# AndroidX ViewPager2 for swipeable views
viewpager2 = "1.1.0"
# AndroidX CardView for UI cards
cardview = "1.0.0"
# Retrofit for type-safe HTTP client
retrofit = "3.0.0"
# AndroidX ConstraintLayout for flexible layouts
constraint_layout = "2.2.1"
# AndroidX Lifecycle Process for observing process lifecycle events
lifecycleProcess = "2.10.0"
# Kotlin Coroutines for asynchronous programming
coroutine = "1.10.2"
# Lottie for rendering After Effects animations
lottie = "6.7.1"
# CircleImageView for circular image views
circleimageview = "3.1.0"
# Media3 for media playback
media3player = "1.8.0"
# MP4 Parser for reading and writing MP4 files
mp4_iso_parser = "1.1.22"
# OkHttp for HTTP client operations
okhttp = "5.3.2"
# Gson for JSON serialization and deserialization
gson = "2.13.2"
# Jsoup for parsing HTML
jsoup = "1.21.2"
# Glide for image loading and caching
glide = "5.0.5"
# PermissionX for easy runtime permission handling
permissionx = "1.8.1"
# Parse SDK for backend services
parse = "4.3.0"
# Storage Access Framework (SAF) helper library
storage = "2.2.0"
# youtube-dl for Android wrapper
ytdlp = "0.18.1"
# DSL-JSON for fast JSON processing
dsljson = "2.0.2"
# JavaX JSON Bind API
jsonbind = "1.0"

[libraries]
# AndroidX Core Kotlin Extensions
androidx-core-ktx = { group = "androidx.core", name = "core-ktx", version.ref = "coreKtx" }
# AndroidX Biometric library for fingerprint and face authentication
androidx-biometric = { module = "androidx.biometric:biometric", version.ref = "biometric" }
# AndroidX WebKit for displaying web content in apps
androidx-webkit = { module = "androidx.webkit:webkit", version.ref = "webkit" }
# AndroidX AppCompat library for backward compatibility
androidx-appcompat = { group = "androidx.appcompat", name = "appcompat", version.ref = "appcompat" }
# AndroidX ViewPager2 for creating swipe views with fragments
androidx-viewpager2 = { group = "androidx.viewpager2", name = "viewpager2", version.ref = "viewpager2" }
# AndroidX CardView for creating UI cards
androidx-cardview = { group = "androidx.cardview", name = "cardview", version.ref = "cardview" }
# AndroidX Lifecycle Process observer
androidx-lifecycle-process = { group = "androidx.lifecycle", name = "lifecycle-process", version.ref = "lifecycleProcess" }

# Desugaring library for Java 8+ NIO APIs
desugar_jdk_libs_nio = { module = "com.android.tools:desugar_jdk_libs_nio", version.ref = "desugar_jdk_libs_nio" }

# Fast Serialization library
fst = { module = "de.ruedigermoeller:fst", version.ref = "fst" }
# High-performance JSON library
dsljson = { module = "com.dslplatform:dsl-json", version.ref = "dsljson" }
# Java API for JSON Binding (JSON-B)
jsonbind_api = { module = "javax.json.bind:javax.json.bind-api", version.ref = "jsonbind" }

# Kotlin Coroutines for Android
kotlin_coroutines = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-android", version.ref = "coroutine" }
# Core Kotlin Coroutines library
kotlin_coroutines_core = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-core", version.ref = "coroutine" }

# Lottie for rendering complex animations
lottie = { module = "com.airbnb.android:lottie", version.ref = "lottie" }
# A fast circular ImageView library
circleimageview = { module = "de.hdodenhof:circleimageview", version.ref = "circleimageview" }
# ConstraintLayout for building responsive UIs
constraint_layout = { group = "androidx.constraintlayout", name = "constraintlayout", version.ref = "constraint_layout" }

# Media3 ExoPlayer main module
media3_exoplayer = { module = "androidx.media3:media3-exoplayer", version.ref = "media3player" }
# Media3 HLS support for ExoPlayer
media3_exoplayer_hls = { module = "androidx.media3:media3-exoplayer-hls", version.ref = "media3player" }
# Media3 DASH support for ExoPlayer
media3_exoplayer_dash = { module = "androidx.media3:media3-exoplayer-dash", version.ref = "media3player" }
# Media3 Session for background playback and media controls
media3_session = { module = "androidx.media3:media3-session", version.ref = "media3player" }
# Media3 Datasource for custom data loading
media3-datasource = { module = "androidx.media3:media3-datasource", version.ref = "media3player" }
# Media3 UI components for media playback
media3_ui = { module = "androidx.media3:media3-ui", version.ref = "media3player" }

# ObjectBox database for Android
objectbox-android = { module = "io.objectbox:objectbox-android", version.ref = "objectbox_android" }
# ObjectBox Kotlin extensions
objectbox-kotlin = { module = "io.objectbox:objectbox-kotlin", version.ref = "objectbox_android" }

# Retrofit, a type-safe HTTP client for Android and Java
retrofit = { module = "com.squareup.retrofit2:retrofit", version.ref = "retrofit" }
# Retrofit Gson converter
retrofit_converter_gson = { module = "com.squareup.retrofit2:converter-gson", version.ref = "retrofit" }
# OkHttp, an efficient HTTP client
okhttp = { module = "com.squareup.okhttp3:okhttp", version.ref = "okhttp" }

# Gson for converting Java Objects into their JSON representation and vice versa
gson = { module = "com.google.code.gson:gson", version.ref = "gson" }
# Jsoup for working with real-world HTML
jsoup = { module = "org.jsoup:jsoup", version.ref = "jsoup" }

# Glide, an image loading and caching library
glide = { module = "com.github.bumptech.glide:glide", version.ref = "glide" }

# PermissionX to simplify runtime permission requests
permissionx = { module = "com.guolindev.permissionx:permissionx", version.ref = "permissionx" }
# A powerful and easy-to-use Storage Access Framework library for Android
saf_storage = { module = "com.anggrayudi:storage", version.ref = "storage" }

# Parse SDK for Android
parse = { module = "com.github.parse-community.Parse-SDK-Android:parse", version.ref = "parse" }

# A library for parsing MP4 files
mp4_iso_parser = { module = "com.googlecode.mp4parser:isoparser", version.ref = "mp4_iso_parser" }
# FFmpeg binary for youtube-dl-android
ytdlp_ffmpeg = { module = "io.github.junkfood02.youtubedl-android:ffmpeg", version.ref = "ytdlp" }
# youtube-dl-android library
ytdlp_library = { module = "io.github.junkfood02.youtubedl-android:library", version.ref = "ytdlp" }
# NewPipe Extractor to get streaming data from various services
newpipe_extractor = { module = "com.github.teamnewpipe.NewPipeExtractor:NewPipeExtractor", version.ref = "new_pipe_extractor" }

[plugins]
# Android Application plugin for building Android apps
android-application = { id = "com.android.application", version.ref = "agp" }
# Kotlin Android plugin
kotlin-android = { id = "org.jetbrains.kotlin.android", version.ref = "kotlin" }
# Kotlin Annotation Processing Tool (kapt)
kotlin-kapt = { id = "org.jetbrains.kotlin.kapt" }
# ObjectBox plugin for database schema generation
objectbox-db = { id = "io.objectbox" }