constraint_layout = "2.2.1"
viewpager2 = "1.1.0"
cardview = "1.0.0"
webkit = "1.14.0"
biometric = "1.1.0"
lifecycle_process = "2.10.0"
work_runtime_ktx = "2.11.0"

retrofit = "3.0.0"
okhttp = "5.3.2"

coroutine = "1.10.2"

media3player = "1.8.0"
mp4_iso_parser = "1.1.22"

objectbox_android = "5.0.1"
storage = "2.2.0"
desugar_jdk_libs_nio = "2.1.5"

string_lz4 = "1.8.0"
