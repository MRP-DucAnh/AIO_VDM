# ------------------------------------------------------------
# Version Catalog
# Centralized place for managing dependency versions & plugins.
# Docs: https://docs.gradle.org/current/userguide/platforms.html#sub:version-catalog
# ------------------------------------------------------------

[versions]
# Android Gradle Plugin
agp = "8.13.2"

# Supabase BOM (Bill of Materials)
authKt = "2.4.1"
bom = "3.2.6"

# Java NIO desugaring support for older Android versions
desugar_jdk_libs_nio = "2.1.5"

# Fast Serialization library
fst = "3.0.3"

# Kotlin language version
kotlin = "2.2.0"

# AndroidX Core KTX utilities
coreKtx = "1.17.0"

# AndroidX AppCompat for backward-compatible UI
appcompat = "1.7.1"

# AndroidX Biometric authentication
biometric = "1.1.0"

# Ktor Client for Android networking
ktorClientAndroid = "3.3.3"

# NewPipeExtractor for parsing video streams
new_pipe_extractor = "v0.24.8"

# ObjectBox database
objectbox_android = "5.0.1"

# WebKit integration
webkit = "1.14.0"

# ViewPager2 (swipe views)
viewpager2 = "1.1.0"

# CardView UI component
cardview = "1.0.0"

# Retrofit HTTP client
retrofit = "3.0.0"

# ConstraintLayout for UI layout
constraint_layout = "2.2.1"

# Lifecycle Process Observer
lifecycleProcess = "2.10.0"

# Kotlin Coroutines
coroutine = "1.10.2"

# Lottie animations
lottie = "6.7.1"

# CircleImageView
circleimageview = "3.1.0"

# Media3 (ExoPlayer)
media3player = "1.8.0"

# MP4 ISO Parser
mp4_iso_parser = "1.1.22"

# OkHttp HTTP client
okhttp = "5.3.2"

# Gson JSON library
gson = "2.13.2"

# Jsoup HTML parser
jsoup = "1.21.2"

# Glide image loader
glide = "5.0.5"

# PermissionX runtime permissions
permissionx = "1.8.1"

# Parse SDK
parse = "4.3.0"

# SAF Storage helper
storage = "2.2.0"

# youtube-dl Android wrapper
ytdlp = "0.18.1"

# DSL-JSON high-performance JSON library
dsljson = "2.0.2"

# Java JSON-B API
jsonbind = "1.0"

# Google Sign-In / Auth APIs
playServicesAuth = "21.0.1"

# ------------------------------------------------------------
# Library Definitions
# ------------------------------------------------------------
[libraries]
# AndroidX Core KTX
androidx-core-ktx = { group = "androidx.core", name = "core-ktx", version.ref = "coreKtx" }

# AndroidX Biometric
androidx-biometric = { module = "androidx.biometric:biometric", version.ref = "biometric" }

# AndroidX WebKit
androidx-webkit = { module = "androidx.webkit:webkit", version.ref = "webkit" }

# AndroidX AppCompat
androidx-appcompat = { group = "androidx.appcompat", name = "appcompat", version.ref = "appcompat" }

# AndroidX ViewPager2
androidx-viewpager2 = { group = "androidx.viewpager2", name = "viewpager2", version.ref = "viewpager2" }

# AndroidX CardView
androidx-cardview = { group = "androidx.cardview", name = "cardview", version.ref = "cardview" }

# AndroidX Lifecycle Process
androidx-lifecycle-process = { group = "androidx.lifecycle", name = "lifecycle-process", version.ref = "lifecycleProcess" }

# Supabase BOM
bom = { module = "io.github.jan-tennert.supabase:bom", version.ref = "bom" }

# Supabase Auth
auth-kt = { module = "io.github.jan-tennert.supabase:auth-kt", version.ref = "authKt" }

# Google Play Services
play-services-auth = { module = "com.google.android.gms:play-services-auth", version.ref = "playServicesAuth" }

# Java desugaring NIO support
desugar_jdk_libs_nio = { module = "com.android.tools:desugar_jdk_libs_nio", version.ref = "desugar_jdk_libs_nio" }

# Fast Serialization (FST)
fst = { module = "de.ruedigermoeller:fst", version.ref = "fst" }

# DSL-JSON
dsljson = { module = "com.dslplatform:dsl-json", version.ref = "dsljson" }

# JSON-B API
jsonbind_api = { module = "javax.json.bind:javax.json.bind-api", version.ref = "jsonbind" }

# Kotlin Coroutines Android
kotlin_coroutines = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-android", version.ref = "coroutine" }

# Kotlin Coroutines Core
kotlin_coroutines_core = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-core", version.ref = "coroutine" }

# Ktor Client Android
ktor-client-android = { module = "io.ktor:ktor-client-android", version.ref = "ktorClientAndroid" }

# Lottie animations
lottie = { module = "com.airbnb.android:lottie", version.ref = "lottie" }

# CircleImageView
circleimageview = { module = "de.hdodenhof:circleimageview", version.ref = "circleimageview" }

# ConstraintLayout
constraint_layout = { group = "androidx.constraintlayout", name = "constraintlayout", version.ref = "constraint_layout" }

# Media3 ExoPlayer modules
media3_exoplayer = { module = "androidx.media3:media3-exoplayer", version.ref = "media3player" }
media3_exoplayer_hls = { module = "androidx.media3:media3-exoplayer-hls", version.ref = "media3player" }
media3_exoplayer_dash = { module = "androidx.media3:media3-exoplayer-dash", version.ref = "media3player" }
media3_session = { module = "androidx.media3:media3-session", version.ref = "media3player" }
media3-datasource = { module = "androidx.media3:media3-datasource", version.ref = "media3player" }
media3_ui = { module = "androidx.media3:media3-ui", version.ref = "media3player" }

# ObjectBox
objectbox-android = { module = "io.objectbox:objectbox-android", version.ref = "objectbox_android" }
objectbox-kotlin = { module = "io.objectbox:objectbox-kotlin", version.ref = "objectbox_android" }

# PostgREST (Supabase)
postgrest-kt = { module = "io.github.jan-tennert.supabase:postgrest-kt" }

# Retrofit
retrofit = { module = "com.squareup.retrofit2:retrofit", version.ref = "retrofit" }

# Retrofit Gson converter
retrofit_converter_gson = { module = "com.squareup.retrofit2:converter-gson", version.ref = "retrofit" }

# OkHttp client
okhttp = { module = "com.squareup.okhttp3:okhttp", version.ref = "okhttp" }

# Gson
gson = { module = "com.google.code.gson:gson", version.ref = "gson" }

# Jsoup
jsoup = { module = "org.jsoup:jsoup", version.ref = "jsoup" }

# Glide image loader
glide = { module = "com.github.bumptech.glide:glide", version.ref = "glide" }

# PermissionX
permissionx = { module = "com.guolindev.permissionx:permissionx", version.ref = "permissionx" }

# SAF Storage
saf_storage = { module = "com.anggrayudi:storage", version.ref = "storage" }

# Parse SDK
parse = { module = "com.github.parse-community.Parse-SDK-Android:parse", version.ref = "parse" }

# MP4 ISO Parser
mp4_iso_parser = { module = "com.googlecode.mp4parser:isoparser", version.ref = "mp4_iso_parser" }

# youtube-dl Android
ytdlp_ffmpeg = { module = "io.github.junkfood02.youtubedl-android:ffmpeg", version.ref = "ytdlp" }
ytdlp_library = { module = "io.github.junkfood02.youtubedl-android:library", version.ref = "ytdlp" }

# NewPipe Extractor
newpipe_extractor = { module = "com.github.teamnewpipe.NewPipeExtractor:NewPipeExtractor", version.ref = "new_pipe_extractor" }


# ------------------------------------------------------------
# Plugins
# ------------------------------------------------------------
[plugins]
# Android Application plugin
android-application = { id = "com.android.application", version.ref = "agp" }

# Kotlin Android plugin
kotlin-android = { id = "org.jetbrains.kotlin.android", version.ref = "kotlin" }

# Kotlin KAPT (Annotation Processing)
kotlin-kapt = { id = "org.jetbrains.kotlin.kapt" }

# ObjectBox Database plugin
objectbox-db = { id = "io.objectbox" }

# Kotlin Serialization plugin (used by Supabase)
supabase_serialization = { id = "org.jetbrains.kotlin.plugin.serialization", version.ref = "kotlin" }