/**
 * This block applies the necessary Gradle plugins for the application.
 * - android.application: The base plugin for building Android applications.
 * - kotlin.android: Enables Kotlin support for Android development.
 * - kotlin.kapt: The Kotlin Annotation Processing Tool for handling annotation processors.
 * - objectbox.db: The plugin for integrating the ObjectBox database.
 */
plugins {
	alias(libs.plugins.android.application)
	alias(libs.plugins.kotlin.android)
	alias(libs.plugins.kotlin.kapt)
	alias(libs.plugins.objectbox.db)
}

/**
 * The main configuration block for the Android application.
 */
android {
	// The namespace for the application's generated R class.
	namespace 'com.aio'
	// The API level to compile the application against.
	compileSdkVersion 36
	// Specifies the version of the NDK to be used.
	ndkVersion '28.0.12916984 rc3'

	/**
	 * Default configuration for all build variants.
	 * These settings can be overridden by specific build types or product flavors.
	 */
	defaultConfig {
		// A unique identifier for the application on the device and in the Google Play Store.
		applicationId "com.aio.video_downloader"
		// The minimum API level required for the app to run.
		minSdk 28
		// The API level the app is designed and tested for.
		targetSdk 36
		// An integer representing the version of the app's code. Incremented for each release.
		versionCode 82
		// A user-facing string for the app version.
		versionName '2025.11.11'
		// Enables the use of vector drawables on pre-Lollipop devices.
		vectorDrawables.useSupportLibrary = true
		// Enables support for applications with more than 65,536 methods.
		multiDexEnabled true

		/**
		 * NDK configuration to specify which ABIs (Application Binary Interfaces) to build for.
		 * This reduces the size of the APK by only including native libraries for the specified architectures.
		 */
		ndk {
			abiFilters "x86", "x86_64", "armeabi-v7a", "arm64-v8a"
		}
	}

	/**
	 * Defines build types for different stages of development, e.g., debug and release.
	 */
	buildTypes {
		debug {
			// Allows debugging of the application.
			debuggable true
			// Disables code shrinking and obfuscation.
			minifyEnabled false
			// Disables removal of unused resources.
			shrinkResources false
			// Creates a custom boolean field in the BuildConfig class.
			buildConfigField "boolean", "IS_DEBUG_MODE_ON", "true"
		}

		release {
			// Disables code shrinking and obfuscation (typically should be 'true' for release).
			minifyEnabled false
			// Disables removal of unused resources (typically should be 'true' for release).
			shrinkResources false
			// Disables debugging for the release build.
			debuggable false
			// Specifies ProGuard rules for code shrinking, obfuscation, and optimization.
			proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'),
				'proguard-rules.pro'
			buildConfigField "boolean", "IS_DEBUG_MODE_ON", "false"
		}
	}

	buildTypes.release.ndk.debugSymbolLevel = "FULL"
	// Enables the generation of the BuildConfig class.
	android.buildFeatures.buildConfig = true

	/**
	 * Specifies packaging options for the final APK.
	 * This is used to resolve conflicts when multiple dependencies include the same files.
	 */
	packagingOptions {
		// Excludes metadata files to prevent packaging conflicts.
		exclude 'META-INF/LICENSE'
		exclude 'META-INF/NOTICE'
		exclude 'META-INF/*.kotlin_module'
		// Uses legacy packaging for native libraries (.so files).
		jniLibs.useLegacyPackaging = true
	}

	/**
	 * Configuration for creating multiple APKs based on screen density or ABI.
	 */
	splits {
		abi {
			// Enables splitting the APK by ABI.
			enable true
			// Clears any previously defined list of ABIs.
			reset()
			// Specifies the ABIs to create separate APKs for.
			include 'x86', 'x86_64', 'armeabi-v7a', 'arm64-v8a'
			// Also generates a universal APK that includes all ABIs.
			universalApk true
		}
	}

	/**
	 * Configures Java compilation options.
	 */
	compileOptions {
		// Enables support for newer Java APIs on older Android versions through "desugaring".
		coreLibraryDesugaringEnabled true
		// Sets the Java language version for the source code.
		sourceCompatibility JavaVersion.VERSION_17
		// Sets the Java language version for the generated bytecode.
		targetCompatibility JavaVersion.VERSION_17
	}

	/**
	 * Configures Kotlin specific options.
	 */
	kotlin {
		// Specifies the JVM target version for the Kotlin compiler.
		jvmToolchain(17)
	}

	/**
	 * Controls whether dependency information is included in the final artifact.
	 * This is typically used for library modules, not application modules.
	 */
	dependenciesInfo {
		includeInBundle false
		includeInApk false
	}
}

// Dependencies for the application.
dependencies {
	// Local JAR dependencies
	implementation fileTree(dir: 'libs', include: ['*.jar'])

	// AndroidX libraries for core UI components and compatibility
	implementation libs.androidx.appcompat
	implementation libs.androidx.viewpager2
	implementation libs.androidx.cardview
	implementation libs.androidx.core.ktx
	implementation libs.constraint.layout
	implementation libs.androidx.webkit
	implementation libs.androidx.biometric
	implementation libs.androidx.lifecycle.process

	// Kotlin Coroutines for asynchronous programming
	implementation libs.kotlin.coroutines.core
	implementation libs.kotlin.coroutines

	// Media3 for media playback (ExoPlayer's successor)
	implementation libs.media3.exoplayer
	implementation libs.media3.exoplayer.hls
	implementation libs.media3.exoplayer.dash
	implementation libs.media3.datasource
	implementation libs.media3.ui
	implementation libs.media3.session

	// ObjectBox for high-performance object-oriented database
	implementation libs.objectbox.android
	implementation libs.objectbox.kotlin

	// JSON and serialization libraries
	implementation libs.fst
	implementation libs.jsoup
	implementation libs.gson
	implementation(libs.dsljson) // DSL Json for fast JSON processing
	kapt(libs.dsljson) // Annotation processor for DSL Json
	compileOnly(libs.jsonbind.api) // API for JSON binding

	// Networking libraries
	implementation libs.retrofit
	implementation libs.retrofit.converter.gson
	implementation libs.okhttp

	// UI enhancement libraries
	implementation libs.lottie
	implementation libs.glide
	implementation libs.circleimageview
	implementation libs.permissionx

	// Storage and data parsing
	implementation libs.saf.storage
	implementation libs.parse

	// Video downloading and extraction libraries
	implementation libs.ytdlp.library
	implementation libs.ytdlp.ffmpeg
	implementation libs.newpipe.extractor
	implementation libs.mp4.iso.parser

	// Desugaring for newer Java APIs on older Android versions
	coreLibraryDesugaring libs.desugar.jdk.libs.nio
}