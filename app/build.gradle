/**
 * This block applies the necessary Gradle plugins for the application.
 * - android.application: The base plugin for building Android applications.
 * - kotlin.android: Enables Kotlin support for Android development.
 * - kotlin.kapt: The Kotlin Annotation Processing Tool for handling annotation processors.
 * - objectbox.db: The plugin for integrating the ObjectBox database.
 */
plugins {
	alias(libs.plugins.android.application)
	alias(libs.plugins.kotlin.android)
	alias(libs.plugins.kotlin.kapt)
	alias(libs.plugins.objectbox.db)
	alias(libs.plugins.supabase.serialization)
}

/**
 * The main configuration block for the Android application.
 */
android {
	// The namespace for the application's generated R class.
	namespace 'com.aio'
	// The API level to compile the application against.
	compileSdkVersion 36
	// Specifies the version of the NDK to be used.
	ndkVersion '28.0.12916984 rc3'

	/**
	 * Default configuration for all build variants.
	 * These settings can be overridden by specific build types or product flavors.
	 */
	defaultConfig {
		// A unique identifier for the application on the device and in the Google Play Store.
		applicationId "com.aio.video_downloader"
		// The minimum API level required for the app to run.
		minSdk 28
		// The API level the app is designed and tested for.
		targetSdk 36
		// An integer representing the version of the app's code. Incremented for each release.
		versionCode 82
		// A user-facing string for the app version.
		versionName '2025.11.11'
		// Enables the use of vector drawables on pre-Lollipop devices.
		vectorDrawables.useSupportLibrary = true
		// Enables support for applications with more than 65,536 methods.
		multiDexEnabled true

		/**
		 * NDK configuration to specify which ABIs (Application Binary Interfaces) to build for.
		 * This reduces the size of the APK by only including native libraries for the specified architectures.
		 */
		ndk {
			abiFilters "x86", "x86_64", "armeabi-v7a", "arm64-v8a"
		}
	}

	/**
	 * Defines build types for different stages of development, e.g., debug and release.
	 */
	buildTypes {
		debug {
			// Allows debugging of the application.
			debuggable true
			// Disables code shrinking and obfuscation.
			minifyEnabled false
			// Disables removal of unused resources.
			shrinkResources false
			// Creates a custom boolean field in the BuildConfig class.
			buildConfigField "boolean", "IS_DEBUG_MODE_ON", "true"
		}

		release {
			// Disables code shrinking and obfuscation (typically should be 'true' for release).
			minifyEnabled false
			// Disables removal of unused resources (typically should be 'true' for release).
			shrinkResources false
			// Disables debugging for the release build.
			debuggable false
			// Specifies ProGuard rules for code shrinking, obfuscation, and optimization.
			proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'),
				'proguard-rules.pro'
			buildConfigField "boolean", "IS_DEBUG_MODE_ON", "false"
		}
	}

	buildTypes.release.ndk.debugSymbolLevel = "FULL"
	// Enables the generation of the BuildConfig class.
	android.buildFeatures.buildConfig = true

	/**
	 * Specifies packaging options for the final APK.
	 * This is used to resolve conflicts when multiple dependencies include the same files.
	 */
	packagingOptions {
		// Excludes metadata files to prevent packaging conflicts.
		exclude 'META-INF/LICENSE'
		exclude 'META-INF/NOTICE'
		exclude 'META-INF/*.kotlin_module'
		// Uses legacy packaging for native libraries (.so files).
		jniLibs.useLegacyPackaging = true
	}

	/**
	 * Configuration for creating multiple APKs based on screen density or ABI.
	 */
	splits {
		abi {
			// Enables splitting the APK by ABI.
			enable true
			// Clears any previously defined list of ABIs.
			reset()
			// Specifies the ABIs to create separate APKs for.
			include 'x86', 'x86_64', 'armeabi-v7a', 'arm64-v8a'
			// Also generates a universal APK that includes all ABIs.
			universalApk true
		}
	}

	/**
	 * Configures Java compilation options.
	 */
	compileOptions {
		// Enables support for newer Java APIs on older Android versions through "desugaring".
		coreLibraryDesugaringEnabled true
		// Sets the Java language version for the source code.
		sourceCompatibility JavaVersion.VERSION_17
		// Sets the Java language version for the generated bytecode.
		targetCompatibility JavaVersion.VERSION_17
	}

	/**
	 * Configures Kotlin specific options.
	 */
	kotlin {
		// Specifies the JVM target version for the Kotlin compiler.
		jvmToolchain(17)
	}

	/**
	 * Controls whether dependency information is included in the final artifact.
	 * This is typically used for library modules, not application modules.
	 */
	dependenciesInfo {
		includeInBundle false
		includeInApk false
	}
}

// Dependencies for the application.
dependencies {
	// Local JAR dependencies
	implementation fileTree(dir: 'libs', include: ['*.jar'])

	// AndroidX libraries for core UI components and compatibility
	implementation libs.androidx.appcompat           // Backward-compatible AppCompat UI components
	implementation libs.androidx.viewpager2          // ViewPager2 for swipe-based page navigation
	implementation libs.androidx.cardview            // CardView UI container with rounded corners
	implementation libs.androidx.core.ktx            // Kotlin extensions for core Android APIs
	implementation libs.androidx.constraintlayout    // Flexible and performant layout system
	implementation libs.androidx.webkit              // WebView and web-related AndroidX APIs
	implementation libs.androidx.biometric           // Biometric authentication (fingerprint/face)
	implementation libs.androidx.lifecycle.process   // Lifecycle handling for the whole app process

	// Kotlin Coroutines for asynchronous programming
	implementation libs.kotlin.coroutines.core       // Core coroutine primitives
	implementation libs.kotlin.coroutines.android    // Android coroutine support and dispatchers

	// Media3 for media playback (ExoPlayer's successor)
	implementation libs.media3.exoplayer             // Core Media3 ExoPlayer implementation
	implementation libs.media3.exoplayer.hls         // HLS streaming support
	implementation libs.media3.exoplayer.dash        // MPEG-DASH streaming support
	implementation libs.media3.datasource            // Media data source implementations
	implementation libs.media3.ui                    // Media player UI components
	implementation libs.media3.session               // Media session and background playback

	// ObjectBox for high-performance object-oriented database
	implementation libs.objectbox.android             // ObjectBox runtime for Android
	implementation libs.objectbox.kotlin              // Kotlin extensions for ObjectBox

	// JSON and serialization libraries
	implementation libs.fst                           // Fast binary serialization
	implementation libs.jsoup                         // HTML parsing and web scraping
	implementation libs.gson                          // JSON parsing and serialization
	implementation(libs.dsljson)                      // High-performance JSON processing
	kapt(libs.dsljson)                                // DSL-JSON annotation processor
	compileOnly(libs.jsonbind.api)                    // JSON-B API (compile-time only)

	// Networking libraries
	implementation libs.retrofit                      // Type-safe REST API client
	implementation libs.retrofit.converter.gson       // Gson converter for Retrofit
	implementation libs.okhttp                        // HTTP client and connection management

	// UI enhancement libraries
	implementation libs.lottie                        // After Effects / Lottie animations
	implementation libs.glide                         // Image loading, caching, and GIF support
	implementation libs.circleimageview               // Circular ImageView widget
	implementation libs.permissionx                   // Simplified runtime permission handling

	// Storage and data parsing
	implementation libs.saf.storage                   // Storage Access Framework helper utilities
	implementation libs.parse                         // Structured data parsing utilities

	// Backend & networking (BOM-managed versions)
	implementation platform(libs.bom)                 // Bill of Materials for aligned versions
	implementation(libs.postgrest.kt)                 // Kotlin client for PostgREST APIs
	implementation(libs.ktor.client.android)          // Ktor HTTP client for Android

	// Authentication & identity
	implementation(libs.androidx.credentials)         // Android Credential Manager API
	implementation(libs.googleid)                     // Google Sign-In / Identity Services

	// Video downloading and extraction libraries
	implementation libs.ytdlp.library                 // yt-dlp core download library
	implementation libs.ytdlp.ffmpeg                  // FFmpeg integration for yt-dlp
	implementation libs.newpipe.extractor              // Media metadata extraction (YouTube, etc.)
	implementation libs.mp4.iso.parser                // MP4/ISO base media file parsing

	// Desugaring for newer Java APIs on older Android versions
	coreLibraryDesugaring libs.desugar.jdk.libs.nio    // Java 8+ API backport for Android
}